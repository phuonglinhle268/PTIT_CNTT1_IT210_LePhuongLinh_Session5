<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">

<head>
    <title>Danh sách món ăn</title>
    <style>
        .out-of-stock {
            color: red;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div layout:fragment="content">

    <h2>Danh sách thực đơn</h2>

    <div th:if="${errorMessage}" class="error">
        <p th:text="${errorMessage}"></p>
    </div>

    <div th:if="${dishes == null or #lists.isEmpty(dishes)}">
        <p>Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau</p>
    </div>

    <table border cellspacing="1" cellpadding="20" th:if="${dishes != null and !#lists.isEmpty(dishes)}">
        <tr>
            <th>ID</th>
            <th>Tên món</th>
            <th>Giá</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>

        <tr th:each="dish : ${dishes}">
            <td th:text="${dish.id}"></td>
            <td th:text="${dish.name}"></td>
            <td th:text="${dish.price}"></td>

            <td>
                <span th:if="${dish.available}">Còn hàng</span>
                <span th:unless="${dish.available}" class="out-of-stock">Hết hàng</span>
            </td>

            <td>
                <a th:href="@{|/bai3/edit/${dish.id}|}">Chỉnh sửa</a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
