<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">

<head>
    <title>Đặt món nhanh</title>
</head>

<body>

<div layout:fragment="content">

    <h2>Đặt món nhanh</h2>

    <ul>
        <li th:each="dish : ${menu}">
            <span th:text="${dish.name}">Phở bò</span> -
            <span th:text="${dish.price}">40000</span> VND
        </li>
    </ul>

</div>

</body>
</html>
